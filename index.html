<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Beat - Rhythm Game</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Cinzel (Celestial) e Space Grotesk (Tech) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #010103;
            overflow: hidden;
            user-select: none;
        }
        .title-celestial {
            font-family: 'Cinzel', serif;
            text-shadow: 0 0 25px rgba(168, 85, 247, 0.4), 0 0 50px rgba(59, 130, 246, 0.2);
        }
        /* Efeito de vidro galáctico */
        .glass-panel {
            background: rgba(6, 6, 15, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.6);
        }
        /* Teclas do piano virtual cósmico */
        .piano-key {
            transition: all 0.2s ease;
        }
        .piano-key:active, .piano-key.active-press {
            transform: scale(0.95) translateY(4px);
            box-shadow: 0 0 30px var(--glow-color);
            background: var(--glow-color);
            color: #000;
        }
        /* Animações de Fade-out suaves */
        .fade-transition {
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        /* Piscar lento do botão ativo */
        @keyframes slowFlash {
            0%, 100% { opacity: 0.3; box-shadow: 0 0 10px var(--glow-color); }
            50% { opacity: 1.0; box-shadow: 0 0 35px var(--glow-color); }
        }
        .flash-slow {
            animation: slowFlash 0.8s infinite ease-in-out;
            border-color: var(--glow-color) !important;
        }
    </style>
</head>
<body class="h-full relative flex flex-col items-center justify-center text-white">

    <!-- CANVAS DO JOGO (Esfera, rastro de glitter, explosões e teclas) -->
    <canvas id="gameCanvas" class="absolute inset-0 z-0 bg-[#010103]"></canvas>

    <!-- Overlay de vinheta cósmica -->
    <div class="absolute inset-0 bg-radial-gradient from-transparent via-[#010103]/40 to-[#010103] z-[1] pointer-events-none"></div>

    <!-- ELEMENTO DE ÁUDIO (beatmj.mp3) -->
    <audio id="musicPlayer" src="beatmj.mp3" preload="auto"></audio>

    <!-- INTERFACE DO USUÁRIO (TELA INICIAL) -->
    <div id="startScreen" class="relative z-10 max-w-md w-full p-6 text-center space-y-8 glass-panel rounded-3xl pointer-events-auto select-none">
        <div class="space-y-3">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-purple-500/10 border border-purple-400/20 text-purple-300 text-[10px] tracking-[0.3em] uppercase backdrop-blur-sm">
                <i data-lucide="music" class="w-3.5 h-3.5"></i> Jogo de Ritmo Interativo
            </div>
            <h1 class="title-celestial text-4xl font-extrabold uppercase text-transparent bg-clip-text bg-gradient-to-b from-white via-slate-100 to-purple-200 drop-shadow-md">
                BEAT IT<br><span class="text-xl font-light tracking-[0.4em] text-purple-300">RHYTHM EXPERIENCE</span>
            </h1>
            <p id="gameDescription" class="text-xs text-slate-400 leading-relaxed px-4">
                Use as teclas <strong class="text-purple-300">1, 2 e 3</strong> do seu teclado ou clique nas teclas na tela. Segure o clique do mouse nas teclas para liberar rastros de glitter!
            </p>
        </div>

        <button onclick="initGame()" class="w-full btn-celestial py-4 rounded-xl text-xs tracking-[0.3em] font-bold uppercase text-purple-200 border border-purple-400/20 hover:border-purple-400 shadow-[0_0_30px_rgba(168,85,247,0.15)] flex items-center justify-center gap-2 group">
            DESPERTAR SINFONIA <i data-lucide="play" class="w-4 h-4 fill-current"></i>
        </button>
    </div>

    <!-- INTERFACE DE PAUSA / GAMEPLAY -->
    <div id="gameUI" class="absolute inset-x-0 bottom-12 z-10 flex flex-col items-center space-y-6 opacity-0 pointer-events-none transition-all duration-1000">
        
        <!-- HUD Informativo de Notas -->
        <div class="flex items-center gap-4 bg-black/60 px-5 py-2.5 rounded-full border border-white/5 backdrop-blur">
            <div class="flex items-center gap-1.5 text-xs tracking-wider">
                <span id="gameStatusIndicator" class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span id="gameStatusText" class="text-slate-300 uppercase font-mono">EM SINTONIA</span>
            </div>
            <div class="h-4 w-[1px] bg-white/10"></div>
            <span id="streakCounter" class="text-xs font-mono text-purple-300">COMBO: 0</span>
        </div>

        <!-- Botão Minimalista de Parar Música -->
        <button onclick="pauseAndExit()" class="pointer-events-auto px-6 py-2 bg-red-600/10 border border-red-500/20 hover:bg-red-600/25 text-red-300 rounded-full text-[10px] font-bold uppercase tracking-[0.2em] transition-all hover:scale-105 active:scale-95 shadow-[0_0_20px_rgba(239,68,68,0.15)]">
            SAIR DA SINFONIA
        </button>
    </div>


    <!-- ================= SISTEMAS FÍSICOS E DE INTERAÇÃO ================= -->
    <script>
        // Efeitos Sonoros Dinâmicos (Web Audio API)
        const playSfx = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                if (type === 'hover') {
                    osc.frequency.setValueAtTime(180, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(280, ctx.currentTime + 0.12);
                    gain.gain.setValueAtTime(0.01, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.12);
                } else if (type === 'click') {
                    osc.frequency.setValueAtTime(140, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(380, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.04, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.2);
                } else if (type === 'synth_beat') {
                    // Batida sintetizada para o modo de fallback
                    osc.frequency.setValueAtTime(120, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.15);
                } else if (type === 'synth_miss') {
                    // Som de nota errada sintetizado
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(90, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(50, ctx.currentTime + 0.4);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.4);
                }
            } catch (e) { /* Fallback silencioso */ }
        };

        // Timestamps exatos das batidas fornecidos por ti
        const beatTimestamps = [
            0.348, 2.090, 3.738, 5.480, 7.198, 8.963, 10.658, 11.122, 11.540, 11.958, 
            12.399, 12.841, 13.491, 13.677, 14.141, 14.350, 14.559, 15.000, 15.232, 
            15.418, 15.650, 15.882, 16.323, 16.764, 17.206, 17.647, 18.089, 18.530, 
            18.971, 19.413, 19.854, 20.296, 20.737, 21.178, 21.620, 22.061, 22.503, 
            22.944, 23.385, 23.827, 24.268
        ];

        // Mapear cada batida para uma tecla alvo de forma sequencial harmônica (Teclas 1, 2, 3)
        const targetKeys = beatTimestamps.map((_, idx) => (idx % 3) + 1);

        // Estado do Jogo
        let isPlaying = false;
        let isPausedByMiss = false;
        let currentBeatIndex = 0;
        let comboStreak = 0;
        let isHitSuccess = false;
        let lastTime = 0;
        let useSynthesizedFallback = false; // Flag para usar áudio simulado se o MP3 falhar
        let virtualTime = 0; // Controla o tempo simulado
        let lastSystemTime = 0;

        // Elementos da página
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const musicPlayer = document.getElementById('musicPlayer');

        // Web Audio API: Gráfico de DSP para Reverb + Echo de 10 segundos
        let audioCtx, audioSource, dryGain, wetGain, delayNode, feedbackGain, convolver;

        function setupAudioGraph() {
            if (audioCtx) return; // Já configurado

            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                audioSource = audioCtx.createMediaElementSource(musicPlayer);

                dryGain = audioCtx.createGain();
                wetGain = audioCtx.createGain();

                // Configurar Delay (Eco)
                delayNode = audioCtx.createDelay(2.0);
                delayNode.delayTime.value = 0.35; // Tempo do eco (350ms)
                feedbackGain = audioCtx.createGain();
                feedbackGain.gain.value = 0.55; // Intensidade do feedback de eco

                // Configurar Reverb Sintetizado de Longo Decaimento (Para evitar arquivos externos)
                convolver = audioCtx.createConvolver();
                const rate = audioCtx.sampleRate;
                const len = rate * 4.0; // 4 segundos de cauda de reverb
                const impulse = audioCtx.createBuffer(2, len, rate);
                const left = impulse.getChannelData(0);
                const right = impulse.getChannelData(1);
                for (let i = 0; i < len; i++) {
                    const decay = Math.exp(-i / (rate * 0.8));
                    left[i] = (Math.random() * 2 - 1) * decay;
                    right[i] = (Math.random() * 2 - 1) * decay;
                }
                convolver.buffer = impulse;

                // Roteamento de Sinal
                audioSource.connect(dryGain);
                audioSource.connect(delayNode);

                // Loop de Feedback do Eco
                delayNode.connect(feedbackGain);
                feedbackGain.connect(delayNode);

                // Conectar o Eco ao Reverb
                delayNode.connect(convolver);
                convolver.connect(wetGain);

                // Conectar saídas ao destino final (Altifalantes)
                dryGain.connect(audioCtx.destination);
                wetGain.connect(audioCtx.destination);

                // Estado inicial: Som direto ligado, efeito mudo
                dryGain.gain.setValueAtTime(1.0, audioCtx.currentTime);
                wetGain.gain.setValueAtTime(0.0, audioCtx.currentTime);
            } catch (error) {
                console.warn("Navegador impediu ou falhou ao criar conexões de áudio complexas. Usando fallback simples de áudio direto.", error);
                // Define as variáveis como nulas para que os métodos de efeito bypassen sem travar o jogo
                audioCtx = null;
                audioSource = null;
                dryGain = null;
                wetGain = null;
            }
        }

        // --- SISTEMAS DE RENDERIZAÇÃO DO CANVAS (GLITTER E NOTAS) ---
        let particles = [];
        let orb = { x: 0, y: 0, targetX: 0, targetY: 0, currentKey: 1, progress: 0 };
        const keyPositions = [
            { id: 1, label: "1", color: "#a855f7", glow: "rgba(168,85,247,0.4)" }, // Roxo
            { id: 2, label: "2", color: "#3b82f6", glow: "rgba(59,130,246,0.4)" },  // Azul
            { id: 3, label: "3", color: "#ec4899", glow: "rgba(236,72,153,0.4)" }   // Rosa
        ];

        // Partícula de Glitter Cósmico
        class GlitterSparkle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8 - 2;
                this.size = Math.random() * 2.5 + 0.8;
                this.alpha = 1.0;
                this.decay = Math.random() * 0.02 + 0.01;
                this.color = color;
            }
            update() {
                this.vx *= 0.96;
                this.vy *= 0.96;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
                
                // Rebota nas bordas da tela
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.save();
                ctx.globalCompositeOperation = "screen";
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = this.size * 5;
                ctx.shadowColor = this.color;
                ctx.fillStyle = "#ffffff";
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        // Desenha as teclas virtuais de piano na base
        function drawVirtualKeys() {
            const keyWidth = Math.min(160, canvas.width / 5);
            const keyHeight = 70;
            const spacing = 35;
            const startX = (canvas.width - (keyWidth * 3 + spacing * 2)) / 2;
            const y = canvas.height - 150;

            keyPositions.forEach((kp, idx) => {
                const x = startX + idx * (keyWidth + spacing);
                kp.currentX = x + keyWidth / 2;
                kp.currentY = y + keyHeight / 2;
                kp.width = keyWidth;
                kp.height = keyHeight;

                // Tecla pisca suave se for o alvo atual do ritmo
                const isTarget = isPlaying && currentBeatIndex < beatTimestamps.length && targetKeys[currentBeatIndex] === kp.id;
                
                ctx.save();
                if (isTarget) {
                    // Efeito de luz neon piscando em slow motion
                    const pulse = Math.abs(Math.sin(Date.now() * 0.008)) * 0.6 + 0.4;
                    ctx.shadowBlur = 25 * pulse;
                    ctx.shadowColor = kp.color;
                    ctx.strokeStyle = kp.color;
                    ctx.fillStyle = `rgba(255,255,255,${0.08 * pulse})`;
                } else {
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = "rgba(255,255,255,0.05)";
                    ctx.strokeStyle = "rgba(255,255,255,0.15)";
                    ctx.fillStyle = "rgba(255,255,255,0.02)";
                }

                // Desenhar a tecla arredondada
                ctx.beginPath();
                ctx.roundRect(x, y, keyWidth, keyHeight, 14);
                ctx.fill();
                ctx.stroke();

                // Rótulo da tecla (1, 2, 3)
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 16px 'Space Grotesk', sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(kp.label, kp.currentX, kp.currentY);
                ctx.restore();
            });
        }

        // Desenha a esfera voadora e seu rastro em direção às notas de piano
        function updateAndDrawOrb(time) {
            if (!isPlaying || currentBeatIndex >= beatTimestamps.length) return;

            const nextBeatTime = beatTimestamps[currentBeatIndex];
            const targetKeyId = targetKeys[currentBeatIndex];
            const targetKey = keyPositions.find(k => k.id === targetKeyId);

            if (!targetKey) return;

            // Posição de origem da esfera (foco central superior)
            const originX = canvas.width / 2;
            const originY = 120;

            // Calcula o progresso do mergulho (janela de 0.6 segundos antes da batida)
            const startTime = nextBeatTime - 0.6;
            const duration = 0.6;
            const progress = Math.min(1, Math.max(0, (time - startTime) / duration));

            // Interpolação suave de voo (Curva de arco)
            orb.x = originX + (targetKey.currentX - originX) * progress;
            // Efeito de parábola de mergulho
            const arcY = Math.sin(progress * Math.PI) * 120;
            orb.y = originY + (targetKey.currentY - originY) * progress - arcY;

            // Libera partículas de glitter sutil constantemente ao longo do rastro
            if (progress > 0 && progress < 1 && Math.random() > 0.3) {
                particles.push(new GlitterSparkle(orb.x, orb.y, targetKey.color));
            }

            // Desenha a Esfera de Energia
            ctx.save();
            ctx.globalCompositeOperation = "screen";
            const glowSize = 14 + Math.sin(Date.now() * 0.01) * 4;
            ctx.shadowBlur = glowSize;
            ctx.shadowColor = targetKey.color;
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(orb.x, orb.y, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        // --- SISTEMA DE FLUXO E LOOP DO JOGO ---
        function animate() {
            // Rastro persistente para suavizar a luz de glitter
            ctx.fillStyle = "rgba(1, 1, 3, 0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Incremento do tempo virtual se estiver no modo de simulação/fallback
            if (isPlaying && useSynthesizedFallback && !isPausedByMiss) {
                const now = performance.now();
                const dt = (now - lastSystemTime) / 1000;
                virtualTime += dt;
                lastSystemTime = now;
            }

            const currentTime = useSynthesizedFallback ? virtualTime : musicPlayer.currentTime;

            // Desenha Teclas e Esfera
            drawVirtualKeys();
            updateAndDrawOrb(currentTime);

            // Atualiza e desenha partículas de glitter
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                }
            }

            // --- LÓGICA DE DETECÇÃO DE RITMO EM TEMPO REAL ---
            if (isPlaying && !isPausedByMiss && currentBeatIndex < beatTimestamps.length) {
                const nextBeat = beatTimestamps[currentBeatIndex];

                // Se passou do tempo do beat e o jogador NÃO acertou a nota
                if (currentTime >= nextBeat - 0.04) {
                    if (isHitSuccess) {
                        // Sucesso: Esfera explode com impacto de glitter na nota
                        const targetKey = keyPositions.find(k => k.id === targetKeys[currentBeatIndex]);
                        triggerHitExplosion(targetKey.currentX, targetKey.currentY, targetKey.color);
                        
                        // Toca batida sintetizada se estiver no modo de fallback
                        if (useSynthesizedFallback) {
                            playSfx('synth_beat');
                        }

                        isHitSuccess = false;
                        currentBeatIndex++;
                        comboStreak++;
                        document.getElementById('streakCounter').innerText = comboStreak;
                    } else {
                        // Perdeu o tempo (Miss)
                        isPausedByMiss = true;
                        if (!useSynthesizedFallback) {
                            musicPlayer.pause();
                        }
                        // Altera o estado do HUD
                        document.getElementById('gameStatusIndicator').className = "h-2 w-2 rounded-full bg-red-500 animate-pulse";
                        document.getElementById('gameStatusText').innerText = "SUSPENSO (AGUARDANDO NOTA)";
                        triggerMissPause();
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        // Dispara explosão brilhante ao acertar nota
        function triggerHitExplosion(x, y, color) {
            for (let i = 0; i < 40; i++) {
                particles.push(new GlitterSparkle(x, y, color));
            }
        }

        // Pausa o jogo instantaneamente aplicando Reverb e Eco
        function triggerMissPause() {
            isPausedByMiss = true;
            comboStreak = 0;
            document.getElementById('streakCounter').innerText = comboStreak;
            
            // Toca som de erro sintetizado no modo de fallback
            if (useSynthesizedFallback) {
                playSfx('synth_miss');
            }

            // Alterar o HUD para estado suspenso
            document.getElementById('gameStatusIndicator').className = "h-2 w-2 rounded-full bg-red-500 animate-pulse";
            document.getElementById('gameStatusText').innerText = "SUSPENSO (AGUARDANDO NOTA)";

            if (!useSynthesizedFallback && audioCtx && wetGain && dryGain) {
                // Ativa o sinal de efeito Reverb + Eco no Web Audio
                wetGain.gain.cancelScheduledValues(audioCtx.currentTime);
                dryGain.gain.cancelScheduledValues(audioCtx.currentTime);

                // Corta o áudio seco imediatamente
                dryGain.gain.setValueAtTime(0.0, audioCtx.currentTime);
                // Liga o efeito espacial com intensidade máxima
                wetGain.gain.setValueAtTime(1.0, audioCtx.currentTime);
                // Agenda o decaimento gradual do eco por 10 segundos
                wetGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 10.0);
            }

            // Permite que o último milissegundo de áudio alimente o eco, depois pausa o player após 50ms
            if (!useSynthesizedFallback) {
                setTimeout(() => {
                    if (isPausedByMiss) {
                        musicPlayer.pause();
                    }
                }, 50);
            }
        }

        // Restaura a música continuamente após pressionar a nota correta
        function resumeSinfonia() {
            if (!isPausedByMiss) return;

            setupAudioGraph();
            
            if (!useSynthesizedFallback && audioCtx && dryGain && wetGain) {
                audioCtx.resume();
                // Restaura o som direto (dry) e desliga o efeito wet
                wetGain.gain.cancelScheduledValues(audioCtx.currentTime);
                dryGain.gain.cancelScheduledValues(audioCtx.currentTime);
                dryGain.gain.setValueAtTime(1.0, audioCtx.currentTime);
                wetGain.gain.setValueAtTime(0.0, audioCtx.currentTime);
            }

            // Retoma a música exatamente do início do beat
            isPausedByMiss = false;
            isHitSuccess = true; // Seta como sucesso para a transição
            
            if (useSynthesizedFallback) {
                virtualTime = beatTimestamps[currentBeatIndex];
                lastSystemTime = performance.now();
                playSfx('synth_beat');
            } else {
                // Corrige o tempo de reprodução para o beat atual de forma limpa
                musicPlayer.currentTime = beatTimestamps[currentBeatIndex];
                musicPlayer.play();
            }

            // Retorna o HUD para estado ativo
            document.getElementById('gameStatusIndicator').className = "h-2 w-2 rounded-full bg-emerald-500 animate-pulse";
            document.getElementById('gameStatusText').innerText = "EM SINTONIA";
        }

        // --- SISTEMAS DE ENTRADA DO JOGADOR ---
        function handleKeyTrigger(keyId) {
            if (!isPlaying) return;

            // Se o jogo está suspenso esperando pela nota atual
            if (isPausedByMiss) {
                const requiredKey = targetKeys[currentBeatIndex];
                if (keyId === requiredKey) {
                    resumeSinfonia();
                } else {
                    playSfx('click'); // Som de erro
                }
            } else {
                // Durante a gameplay ativa
                const requiredKey = targetKeys[currentBeatIndex];
                const currentTime = useSynthesizedFallback ? virtualTime : musicPlayer.currentTime;
                const nextBeat = beatTimestamps[currentBeatIndex];

                // Permite o acerto apenas se estiver na janela de ação de 0.6s
                if (keyId === requiredKey && currentTime >= (nextBeat - 0.6) && currentTime <= nextBeat) {
                    isHitSuccess = true;
                } else {
                    playSfx('click');
                }
            }
        }

        // Entrada física de teclado
        window.addEventListener('keydown', (e) => {
            if (e.key === '1') handleKeyTrigger(1);
            if (e.key === '2') handleKeyTrigger(2);
            if (e.key === '3') handleKeyTrigger(3);
        });

        // Entrada por clique na tela (Dividido em 3 colunas de toque)
        window.addEventListener('mousedown', (e) => {
            if (!isPlaying) return;

            // Divide a largura da tela em 3 áreas de clique
            const sector = Math.floor((e.clientX / window.innerWidth) * 3) + 1;
            handleKeyTrigger(sector);
        });

        // --- CONTROLES DE INICIALIZAÇÃO E FLUXO ---
        function initGame() {
            // Ativa Web Audio API e inicia áudio
            setupAudioGraph();
            playSfx('click');
            
            // Oculta tela inicial
            const startScr = document.getElementById('startScreen');
            startScr.classList.add('opacity-0', 'scale-95', 'pointer-events-none');
            setTimeout(() => startScr.classList.add('hidden'), 800);

            // Revela interface de jogo
            const gameUI = document.getElementById('gameUI');
            gameUI.classList.remove('hidden');
            setTimeout(() => {
                gameUI.classList.remove('opacity-0', 'pointer-events-none');
                gameUI.classList.add('opacity-100');
            }, 200);

            if (audioCtx) {
                audioCtx.resume();
            }
            
            isPlaying = true;
            isPausedByMiss = false;
            isHitSuccess = false;
            currentBeatIndex = 0;
            comboStreak = 0;

            if (useSynthesizedFallback) {
                virtualTime = 0;
                lastSystemTime = performance.now();
            } else {
                musicPlayer.currentTime = 0;
                musicPlayer.play().catch(err => {
                    console.warn("Autoplay bloqueado ou falha de carregamento de áudio. Ativando Sintetizador de Emergência.", err);
                    useSynthesizedFallback = true;
                    virtualTime = 0;
                    lastSystemTime = performance.now();
                });
            }
        }

        function pauseAndExit() {
            playSfx('click');
            if (!useSynthesizedFallback) {
                musicPlayer.pause();
            }
            isPlaying = false;
            isPausedByMiss = false;

            // Restaura tela inicial
            const startScr = document.getElementById('startScreen');
            startScr.classList.remove('hidden');
            setTimeout(() => startScr.classList.remove('opacity-0', 'scale-95', 'pointer-events-none'), 50);

            // Oculta interface de jogo
            const gameUI = document.getElementById('gameUI');
            gameUI.classList.remove('opacity-100');
            gameUI.classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => gameUI.classList.add('hidden'), 800);
        }

        // Ajuste de Volume
        function setVolume(value) {
            musicPlayer.volume = value / 100;
        }

        // Gerenciamento amigável de erro de carregamento de áudio (Failsafe)
        musicPlayer.addEventListener('error', (e) => {
            console.warn("Erro ao carregar o arquivo 'beatmj.mp3'. Ativando o Sintetizador de Emergência.", musicPlayer.error);
            useSynthesizedFallback = true;
            const desc = document.getElementById('gameDescription');
            if (desc) {
                desc.innerHTML = "<span class='text-yellow-400 font-bold'>Modo de Demonstração Ativo (Sintetizador Integrado).</span><br>Quando você subir os arquivos corretos para o GitHub Pages ou local, o áudio original do Michael Jackson tocará automaticamente!";
            }
        });

        // Loop de animação ativo
        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
