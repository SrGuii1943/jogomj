<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Soundwave - Menu Principal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Cinzel (Celestial) e Space Grotesk (Tech) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #010103;
            overflow: hidden;
            user-select: none;
        }
        .title-celestial {
            font-family: 'Cinzel', serif;
            text-shadow: 0 0 25px rgba(168, 85, 247, 0.4), 0 0 50px rgba(59, 130, 246, 0.2);
        }
        /* Efeito de vidro galáctico */
        .glass-panel {
            background: rgba(6, 6, 15, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.6);
        }
        /* Estilo premium para botões */
        .btn-celestial {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .btn-celestial:hover {
            border-color: rgba(168, 85, 247, 0.6);
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.25);
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.05);
        }
        /* Animação de pulsar do player */
        @keyframes orbitPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(168, 85, 247, 0.15); }
            50% { box-shadow: 0 0 35px rgba(59, 130, 246, 0.35); }
        }
        .active-player {
            animation: orbitPulse 4s infinite ease-in-out;
            border-color: rgba(168, 85, 247, 0.4);
        }
        /* Fade-out para transição suave de elementos de interface */
        .fade-transition {
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
    </style>
</head>
<body class="h-full relative flex flex-col items-center justify-center text-white">

    <!-- CANVAS DO AUDIO SPECTRUM E CHUVA DE GLITTER -->
    <canvas id="cosmicCanvas" class="absolute inset-0 z-0 bg-[#010103]"></canvas>

    <!-- Overlay de vinheta para realçar o brilho das luzes de neon -->
    <div class="absolute inset-0 bg-radial-gradient from-transparent via-[#010103]/50 to-[#010103] z-[1] pointer-events-none"></div>

    <!-- ELEMENTO DE ÁUDIO -->
    <audio id="musicPlayer" loop></audio>

    <!-- INTERFACE DO USUÁRIO -->
    <div class="relative z-10 w-full h-full flex flex-col justify-between p-6 md:p-12 pointer-events-none select-none">
        
        <!-- TOPO: Indicador de status dinâmico -->
        <header id="uiHeader" class="w-full flex justify-between items-center text-xs tracking-[0.2em] text-slate-300 font-light transition-opacity duration-1000">
            <div class="flex items-center gap-2 bg-black/50 px-4 py-2 rounded-full border border-white/5 backdrop-blur-sm pointer-events-auto">
                <span id="statusIndicator" class="h-2 w-2 rounded-full bg-red-500 animate-pulse"></span>
                <span id="statusText">SINFONIA INATIVA (SELECIONE UMA TRILHA)</span>
            </div>
            <div class="hidden md:flex items-center gap-2 bg-black/50 px-4 py-2 rounded-full border border-white/5 backdrop-blur-sm">
                <i data-lucide="sparkles" class="w-3.5 h-3.5 text-purple-400 animate-pulse"></i>
                <span id="instructionText">ESCOLHA UMA MÚSICA E SEGURE O CLIQUE PARA INTERAGIR</span>
            </div>
        </header>

        <!-- CENTRO: Título e Player Holográfico -->
        <main class="flex flex-col items-center justify-center flex-grow py-6 text-center space-y-8">
            
            <!-- Título Principal (Oculta ao iniciar música) -->
            <div id="uiTitle" class="space-y-3 fade-transition">
                <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-purple-500/10 border border-purple-400/20 text-purple-300 text-[10px] tracking-[0.3em] uppercase backdrop-blur-sm">
                    <i data-lucide="activity" class="w-3.5 h-3.5"></i> Spectrum & Glitter Cósmico
                </div>
                <h1 class="title-celestial text-5xl md:text-7xl tracking-[0.25em] font-extrabold uppercase text-transparent bg-clip-text bg-gradient-to-b from-white via-slate-100 to-purple-200 drop-shadow-md">
                    COSMIC<br><span class="text-3xl md:text-5xl font-light tracking-[0.4em] text-purple-300">SPECTRUM</span>
                </h1>
            </div>

            <!-- CARD DO PLAYER (Oculta ao iniciar música) -->
            <div id="playerCard" class="glass-panel p-6 rounded-2xl w-full max-w-lg pointer-events-auto fade-transition">
                <div class="flex flex-col space-y-5">
                    <div class="flex items-center justify-between border-b border-white/10 pb-3">
                        <div class="flex items-center gap-2">
                            <i data-lucide="music-4" id="discIcon" class="w-5 h-5 text-purple-400"></i>
                            <span class="text-xs tracking-[0.2em] font-bold text-slate-300 uppercase">Sintonizador de Espectro</span>
                        </div>
                        <span id="nowPlayingText" class="text-[10px] text-purple-300 tracking-wider font-bold">NENHUMA FAIXA ATIVA</span>
                    </div>

                    <!-- Lista Completa das 4 Faixas -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-2.5">
                        <button onclick="selectTrack('beatmj.mp3', 'Beat It - MJ', 'btn-beat')" id="btn-beat" class="btn-celestial py-3 px-4 rounded-xl text-xs tracking-wider font-medium text-left flex items-center justify-between hover:text-white text-slate-400">
                            <span class="truncate">1. Beat It</span>
                            <i data-lucide="play" class="w-3.5 h-3.5 text-slate-500"></i>
                        </button>
                        <button onclick="selectTrack('billiemj.mp3', 'Billie Jean - MJ', 'btn-billie')" id="btn-billie" class="btn-celestial py-3 px-4 rounded-xl text-xs tracking-wider font-medium text-left flex items-center justify-between hover:text-white text-slate-400">
                            <span class="truncate">2. Billie Jean</span>
                            <i data-lucide="play" class="w-3.5 h-3.5 text-slate-500"></i>
                        </button>
                        <button onclick="selectTrack('badmj.mp3', 'Bad - MJ', 'btn-bad')" id="btn-bad" class="btn-celestial py-3 px-4 rounded-xl text-xs tracking-wider font-medium text-left flex items-center justify-between hover:text-white text-slate-400">
                            <span class="truncate">3. Bad</span>
                            <i data-lucide="play" class="w-3.5 h-3.5 text-slate-500"></i>
                        </button>
                        <button onclick="selectTrack('olodummj.mp3', 'They Don\'t Care (Olodum)', 'btn-olodum')" id="btn-olodum" class="btn-celestial py-3 px-4 rounded-xl text-xs tracking-wider font-medium text-left flex items-center justify-between hover:text-white text-slate-400">
                            <span class="truncate">4. Olodum Mix</span>
                            <i data-lucide="play" class="w-3.5 h-3.5 text-slate-500"></i>
                        </button>
                    </div>

                    <!-- Controle de Volume Integrado -->
                    <div class="flex items-center justify-end gap-3 pt-1">
                        <i data-lucide="volume-2" class="w-4 h-4 text-slate-400"></i>
                        <input type="range" min="0" max="100" value="80" oninput="setVolume(this.value)" class="w-24 accent-purple-500 bg-white/10 h-1.5 rounded-lg cursor-pointer">
                    </div>
                </div>
            </div>

            <!-- BOTÃO DE PARAR: Visível apenas durante a reprodução da música -->
            <div id="stopButtonContainer" class="pointer-events-auto fade-transition opacity-0 scale-90 hidden">
                <button onclick="pauseMusic()" class="relative px-10 py-4 bg-purple-600/10 border border-purple-500/40 hover:bg-purple-600/25 text-purple-200 rounded-full text-xs font-bold uppercase tracking-[0.3em] transition-all hover:scale-105 active:scale-95 shadow-[0_0_30px_rgba(168,85,247,0.2)] flex items-center gap-2.5">
                    <i data-lucide="square" class="w-4 h-4 fill-current text-purple-400"></i> PARAR TRILHA CÓSMICA
                </button>
            </div>
        </main>
    </div>

    <!-- ================= SISTEMAS FÍSICOS E DE INTERAÇÃO ================= -->
    <script>
        // Inicializar ícones Lucide
        lucide.createIcons();

        // Efeitos Sonoros Dinâmicos para cliques (Web Audio API)
        const playSfx = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                if (type === 'hover') {
                    osc.frequency.setValueAtTime(180, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(280, ctx.currentTime + 0.12);
                    gain.gain.setValueAtTime(0.01, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.12);
                } else if (type === 'click') {
                    osc.frequency.setValueAtTime(140, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(380, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.04, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.2);
                }
            } catch (e) { /* Fallback silencioso se bloqueado */ }
        };

        // Elementos e Estado Global
        const canvas = document.getElementById('cosmicCanvas');
        const ctx = canvas.getContext('2d');
        const musicPlayer = document.getElementById('musicPlayer');
        
        let isPlaying = false;
        let colorHue = 270; // Matiz inicial (Roxo Cósmico)
        let colorPulse = 0; // Pulsação constante de cor
        let intensityPulse = 0; // Controla pulsação da luz ambiente
        
        let particles = [];
        const maxParticles = 1200; // Quantidade de glitter ultra fina e detalhada
        const mouse = { x: null, y: null, px: null, py: null, vx: 0, vy: 0, down: false };

        // Variáveis de ondas de áudio espectrais simuladas
        let spectrumBands = [];
        const numBands = 180; // Detalhe fino de barras do espectro

        // Ajuste dinâmico de tamanho do Canvas
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
            initSpectrum();
        }

        // Inicializa o Audio Spectrum (barras de frequência)
        function initSpectrum() {
            spectrumBands = [];
            for (let i = 0; i < numBands; i++) {
                spectrumBands.push({
                    x: (canvas.width / numBands) * i,
                    targetHeight: 5,
                    currentHeight: 5,
                    phase: Math.random() * Math.PI * 2,
                    speed: 0.05 + Math.random() * 0.08
                });
            }
        }

        // Definição da Partícula de Glitter Cósmico (Fina, brilhante e detalhada)
        class GlitterParticle {
            constructor() {
                this.reset(true);
            }

            reset(init = false) {
                // Se for clique ou movimento, nascem exatamente embaixo do mouse
                if (!init && mouse.x !== null) {
                    this.x = mouse.x + (Math.random() - 0.5) * 15;
                    this.y = mouse.y + (Math.random() - 0.5) * 15;
                    // Velocidade explosiva ao nascer a partir do cursor
                    this.vx = (Math.random() - 0.5) * 10 + mouse.vx * 0.5;
                    this.vy = (Math.random() - 0.5) * 10 + mouse.vy * 0.5;
                } else {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 1.5;
                    this.vy = (Math.random() - 0.5) * 1.5;
                }
                
                // Tamanhos minúsculos para dar o efeito de Glitter bem fino e brilhante
                this.size = Math.random() * 1.6 + 0.4;
                this.alpha = Math.random() * 0.8 + 0.2;
                this.decay = Math.random() * 0.006 + 0.002;
                this.hueOffset = Math.random() * 90;
                
                // Frequência de cintilação (glitter pisca rápido)
                this.twinkleSpeed = 0.08 + Math.random() * 0.12;
                this.twinklePhase = Math.random() * Math.PI;
            }

            update() {
                // SÓ INTERAGE se a música estiver ativa E o mouse pressionado
                if (isPlaying && mouse.down && mouse.x !== null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    let radius = 300; // Raio gravitacional do cursor

                    if (dist < radius) {
                        let force = (radius - dist) / radius;
                        
                        // Efeito de redemoinho gravitacional fino e rápido em volta do mouse
                        let orbitX = (dy / dist) * force * 5;
                        let orbitY = (-dx / dist) * force * 5;

                        // Adiciona vento e inércia instantânea com o movimento do mouse
                        let dragX = mouse.vx * force * 1.2;
                        let dragY = mouse.vy * force * 1.2;

                        this.vx += orbitX + dragX;
                        this.vy += orbitY + dragY;
                    }
                }

                // Aplica atrito suave (Garante que o glitter se mova de forma lisa e elegante)
                this.vx *= 0.94;
                this.vy *= 0.94;

                this.x += this.vx;
                this.y += this.vy;

                // REBATE NAS BORDAS DO MONITOR E VOLTA (Física de rebote clássica com conservação de energia!)
                if (this.x < 0) {
                    this.x = 0;
                    this.vx *= -0.9;
                } else if (this.x > canvas.width) {
                    this.x = canvas.width;
                    this.vx *= -0.9;
                }

                if (this.y < 0) {
                    this.y = 0;
                    this.vy *= -0.9;
                } else if (this.y > canvas.height) {
                    this.y = canvas.height;
                    this.vy *= -0.9;
                }

                // Esmaecimento gradual e respawn
                this.alpha -= this.decay;
                if (this.alpha <= 0) {
                    this.reset(false);
                }
            }

            draw() {
                if (this.alpha <= 0) return;

                ctx.save();
                ctx.globalCompositeOperation = "screen";

                // Efeito cintilante (twinkle) multiplicando a opacidade senoidalmente
                let twinkle = Math.abs(Math.sin(Date.now() * this.twinkleSpeed + this.twinklePhase));
                let hue = Math.floor(colorPulse + this.hueOffset) % 360;

                // Estilo Glitter: Pontos minúsculos com brilho neon intenso
                ctx.shadowBlur = this.size * 6;
                ctx.shadowColor = `hsla(${hue}, 100%, 65%, ${this.alpha * twinkle})`;
                ctx.fillStyle = `hsla(${(hue - 20) % 360}, 100%, 85%, ${this.alpha * twinkle})`;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // Inicializador de glitter
        function initParticles() {
            particles = [];
            for (let i = 0; i < maxParticles; i++) {
                let p = new GlitterParticle();
                particles.push(p);
            }
        }

        // Atualização e Desenho do Audio Spectrum Fino e Detalhado
        function drawSpectrum() {
            ctx.save();
            ctx.globalCompositeOperation = "screen";

            for (let i = 0; i < spectrumBands.length; i++) {
                let band = spectrumBands[i];

                if (isPlaying) {
                    // Calcula flutuação de frequência rítmica baseada na música ativa
                    band.phase += band.speed;
                    let audioWave = Math.sin(band.phase) * Math.cos(band.phase * 0.5) * 110;
                    
                    // Se o mouse estiver pressionado por perto, as frequências se curvam em direção ao cursor
                    if (mouse.down && mouse.x !== null) {
                        let distToMouse = Math.abs(band.x - mouse.x);
                        if (distToMouse < 200) {
                            let bend = (200 - distToMouse) / 200;
                            // Distorce a altura em direção ao mouse criando ondas e distorções
                            audioWave += (mouse.y - (canvas.height - 120)) * bend * 0.9;
                        }
                    }

                    // Força a transição suave de altura da barra
                    band.targetHeight = Math.max(8, Math.abs(audioWave));
                } else {
                    // Espectro dormente (linhas finas e planas)
                    band.targetHeight = 4;
                }

                band.currentHeight += (band.targetHeight - band.currentHeight) * 0.15;

                // Desenha o espectro como micro barras finas e detalhadas compostas de glitter
                let hue = Math.floor(colorPulse + (i * 1.5)) % 360;
                ctx.shadowBlur = isPlaying ? 10 : 0;
                ctx.shadowColor = `hsla(${hue}, 100%, 60%, 0.8)`;
                ctx.fillStyle = isPlaying ? `hsla(${hue}, 100%, 75%, 0.9)` : "rgba(100, 116, 139, 0.4)";

                // Desenha barras subindo de forma simétrica do rodapé
                let barWidth = (canvas.width / numBands) * 0.7;
                let barHeight = band.currentHeight;
                let barY = canvas.height - barHeight - 40;

                ctx.beginPath();
                ctx.roundRect(band.x, barY, barWidth, barHeight, 2);
                ctx.fill();
            }
            ctx.restore();
        }

        // Loop de Renderização Principal
        function animate() {
            // Efeito de rastro leve para manter as caudas brilhantes de glitter suaves
            ctx.fillStyle = "rgba(1, 1, 3, 0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (isPlaying) {
                colorHue = (colorHue + 0.15) % 360;
                colorPulse = (colorPulse + 0.45) % 360; // Pulsação de cor constante
                intensityPulse = Math.sin(Date.now() * 0.003) * 0.15 + 0.85;

                // Desenha um brilho de luz de neon ambiente sutil no fundo
                drawGlobalAmbientGlow();
            }

            // Atualiza e desenha Audio Spectrum
            drawSpectrum();

            // Atualiza e desenha fumaças de glitter
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            // Reduz inércia residual da velocidade registrada do mouse
            mouse.vx *= 0.92;
            mouse.vy *= 0.92;

            requestAnimationFrame(animate);
        }

        // Desenha clarão de luz de neon ambiente pulsante que ocupa a tela
        function drawGlobalAmbientGlow() {
            ctx.save();
            ctx.globalCompositeOperation = "screen";
            let centerGlow = ctx.createRadialGradient(
                canvas.width / 2, canvas.height / 2, 10,
                canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height) * 0.8
            );
            centerGlow.addColorStop(0, `hsla(${colorHue}, 95%, 45%, ${0.05 * intensityPulse})`);
            centerGlow.addColorStop(1, "transparent");
            ctx.fillStyle = centerGlow;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();
        }

        // Rastreamento dinâmico do clique e arrasto
        window.addEventListener('mousedown', () => {
            if (isPlaying) {
                mouse.down = true;
                // Dispara efeito sonoro do clique de espectro
                playSfx('click');
            }
        });

        window.addEventListener('mouseup', () => {
            mouse.down = false;
        });

        window.addEventListener('mousemove', (e) => {
            if (mouse.x !== null && mouse.y !== null) {
                mouse.vx = e.clientX - mouse.x;
                mouse.vy = e.clientY - mouse.y;
            }
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
            mouse.vx = 0;
            mouse.vy = 0;
            mouse.down = false;
        });

        // Configuração Inicial de Execução
        window.addEventListener('resize', resize);
        resize();
        animate();

        // ================= FLUXO DINÂMICO DE MÚSICA & INTERFACE =================

        function selectTrack(fileName, trackName, buttonId) {
            playSfx('click');

            // Troca o arquivo de áudio e reproduz
            musicPlayer.src = fileName;
            musicPlayer.play().then(() => {
                isPlaying = true;
                
                // Atualiza textos
                document.getElementById('nowPlayingText').innerText = trackName.toUpperCase();
                document.getElementById('statusIndicator').className = "h-2 w-2 rounded-full bg-emerald-500 animate-pulse";
                document.getElementById('statusText').innerText = "ESPECTRO TOTALMENTE REATIVO SINTONIZADO";

                // Inicia transição e esconde todos os componentes de interface para liberar o desenho livre
                toggleInterface(true);
            }).catch(err => {
                console.warn("Autoplay rejeitado pelo navegador.", err);
                isPlaying = false;
            });
        }

        function pauseMusic() {
            playSfx('click');
            musicPlayer.pause();
            isPlaying = false;
            mouse.down = false;

            // Restaura textos padrão
            document.getElementById('nowPlayingText').innerText = "NENHUMA FAIXA ATIVA";
            document.getElementById('statusIndicator').className = "h-2 w-2 rounded-full bg-red-500 animate-pulse";
            document.getElementById('statusText').innerText = "SINFONIA INATIVA (SELECIONE UMA MÚSICA)";

            // Restaura componentes de interface originais
            toggleInterface(false);
        }

        // Monitor de encerramento da música (Quando a música acaba, a interface retorna automaticamente)
        musicPlayer.addEventListener('ended', () => {
            isPlaying = false;
            mouse.down = false;
            document.getElementById('nowPlayingText').innerText = "NENHUMA FAIXA ATIVA";
            document.getElementById('statusIndicator').className = "h-2 w-2 rounded-full bg-red-500 animate-pulse";
            document.getElementById('statusText').innerText = "SINFONIA INATIVA (SELECIONE UMA MÚSICA)";
            toggleInterface(false);
        });

        // Ajuste de Volume
        function setVolume(value) {
            musicPlayer.volume = value / 100;
        }

        // Função responsável por ocultar/revelar elementos com transição fluida
        function toggleInterface(hide) {
            const uiTitle = document.getElementById('uiTitle');
            const playerCard = document.getElementById('playerCard');
            const uiHeader = document.getElementById('uiHeader');
            const stopBtnContainer = document.getElementById('stopButtonContainer');

            if (hide) {
                // Esconde interface de forma extremamente suave
                uiTitle.classList.add('opacity-0', 'scale-95', 'pointer-events-none');
                playerCard.classList.add('opacity-0', 'scale-95', 'pointer-events-none');
                uiHeader.classList.add('opacity-0', 'pointer-events-none');

                // Revela apenas o botão futurista de parar música no rodapé
                setTimeout(() => {
                    stopBtnContainer.classList.remove('hidden');
                    setTimeout(() => {
                        stopBtnContainer.classList.remove('opacity-0', 'scale-90');
                        stopBtnContainer.classList.add('opacity-100', 'scale-100');
                    }, 50);
                }, 400);
            } else {
                // Esconde botão de parar música
                stopBtnContainer.classList.remove('opacity-100', 'scale-100');
                stopBtnContainer.classList.add('opacity-0', 'scale-90');
                setTimeout(() => {
                    stopBtnContainer.classList.add('hidden');
                    
                    // Restaura interface principal completa
                    uiTitle.classList.remove('opacity-0', 'scale-95', 'pointer-events-none');
                    playerCard.classList.remove('opacity-0', 'scale-95', 'pointer-events-none');
                    uiHeader.classList.remove('opacity-0', 'pointer-events-none');
                }, 400);
            }
        }
    </script>
</body>
</html>
